version: '3.9'

services:
  pg_index_db:
    image: postgres
    restart: always
    shm_size: 512mb
    environment:
      POSTGRES_PASSWORD: default_password
    ports:
      - 8001:8001
    volumes:
      - db_data:/var/lib/postgresql/data
  joogle:
    build: .
    ports:
      - 8000:8000
    command: ["/usr/local/bin/joogle"]

volumes:
  db_data:
    driver: local

