version: '3.9'

services:
  pg_index_db:
    image: postgres
    restart: always
    shm_size: 512mb
    environment:
      POSTGRES_PASSWORD: default_password
      POSTGRES_USERNAME: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports: 
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
  joogle:
    build: .
    command: ["/usr/local/bin/joogle"]
    ports:
      - 8000:8000

volumes:
  db_data:
    driver: local

